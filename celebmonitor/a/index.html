<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open in InSnaps CelebMonitor</title>
  <meta name="description" content="Open this CelebMonitor link in the InSnaps app.">
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b0b0d;
      --card: #16161a;
      --text: #f5f5f7;
      --muted: #a1a1aa;
      --accent: #14b8a6;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #17171c;
        --muted: #5b6472;
        --accent: #0d9488;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border-radius: 16px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 8px 36px rgba(0, 0, 0, 0.2);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      line-height: 1.25;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .actions {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }
    .btn {
      display: inline-block;
      border-radius: 999px;
      padding: 12px 16px;
      text-decoration: none;
      font-weight: 600;
    }
    .btn.primary {
      background: var(--accent);
      color: #fff;
    }
    .btn.secondary {
      border: 1px solid rgba(127, 127, 127, 0.35);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Open in InSnaps CelebMonitor</h1>
    <p id="status">Trying to open the app...</p>
    <div class="actions">
      <a id="openBtn" href="#" class="btn primary">Open InSnaps</a>
      <a id="storeBtn" href="#" class="btn secondary" rel="noopener">Download InSnaps</a>
    </div>
  </main>

  <script>
    (function () {
      var appStore = 'https://apps.apple.com/us/app/insnaps-read-share-world-news/id6762338049';
      var playStore = 'https://play.google.com/store/apps/details?id=com.prakshaappthree.appthree';
      var search = new URLSearchParams(window.location.search || '');
      var token = search.get('t') || '';
      if (!token) {
        var path = window.location.pathname || '';
        var idx = path.indexOf('/celebmonitor/a/');
        if (idx !== -1) token = path.slice(idx + '/celebmonitor/a/'.length).split('/')[0].split('?')[0];
      }

      var ua = navigator.userAgent || '';
      var isAndroid = /Android/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isMac = /Macintosh/i.test(ua);
      var openBtn = document.getElementById('openBtn');
      var storeBtn = document.getElementById('storeBtn');
      var status = document.getElementById('status');

      var deeplinkPath = token ? '/a/' + encodeURIComponent(token) : '';
      var customUrl = 'insnaps://celebmonitor' + deeplinkPath;
      var androidIntent = 'intent://celebmonitor' + deeplinkPath +
        '#Intent;scheme=insnaps;package=com.prakshaappthree.appthree;S.browser_fallback_url=' +
        encodeURIComponent(playStore) + ';end';

      if (isAndroid) {
        storeBtn.href = playStore;
      } else {
        storeBtn.href = appStore;
      }

      openBtn.href = isAndroid ? androidIntent : customUrl;
      if (!token) status.textContent = 'Token missing in URL. You can still open or install the app.';

      if (token && (isAndroid || isIOS || isMac)) {
        window.location.href = isAndroid ? androidIntent : customUrl;
        if (!isAndroid) {
          setTimeout(function () {
            window.location.href = appStore;
          }, 1500);
        }
      } else {
        status.textContent = 'Open this link in the app using the button below.';
      }
    })();
  </script>
</body>
</html>
