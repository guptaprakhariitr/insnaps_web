<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting… | InSnaps : Swipe & Share Global News</title>
  <link rel="icon" type="image/png" href="/logo.png">
</head>
<body>
  <p>Redirecting…</p>
  <script>
    (function () {
      var path = location.pathname.replace(/\/$/, '');
      var search = new URLSearchParams(location.search || '');
      var token = '';
      var redirectBase = '';

      var celebIdx = path.indexOf('/celebmonitor/a/');
      if (celebIdx !== -1) {
        token = path.slice(celebIdx + '/celebmonitor/a/'.length).split('/')[0].split('?')[0];
        redirectBase = '/celebmonitor/a/';
      } else {
        var idx = path.indexOf('/a/');
        if (idx !== -1) {
          token = path.slice(idx + 3).split('/')[0].split('?')[0];
          redirectBase = '/a/';
        }
      }

      if (token) {
        if (redirectBase) {
          location.replace(redirectBase + '?t=' + encodeURIComponent(token));
          return;
        }
      }

      if (path === '/celebmonitor/a') {
        location.replace('/celebmonitor/a/' + (search.get('t') ? '?t=' + encodeURIComponent(search.get('t')) : ''));
        return;
      }

      if (path === '/a') {
        location.replace('/a/' + (search.get('t') ? '?t=' + encodeURIComponent(search.get('t')) : ''));
        return;
      }
      location.replace('/');
    })();
  </script>
</body>
</html>
